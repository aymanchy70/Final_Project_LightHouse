<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' View Category' : (categoryId ? ' Edit Category' : ' Add Category') }}</h2>
  </div>

  @if (error) { <div class="alert-error">{{ error }}</div> }
  @if (success) { <div class="alert-success"> {{ success }}</div> }
  @if (loading) { <div class="alert-info"> Loading...</div> }

  @if (!loading) {
    <div class="form-box">

      <div class="form-group">
        <label>Category Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="category.categoryName" placeholder="e.g. Fiction, Science" maxlength="100" [disabled]="viewOnly" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="category.categoryDescription" placeholder="Brief description (optional)" maxlength="250" rows="3" [disabled]="viewOnly"></textarea>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="category.isActive" [disabled]="viewOnly" />
          <span>Active</span>
        </label>
      </div>

      @if (!categoryId) {
        <div class="form-group">
          <label>Created By</label>
          <input type="text" [(ngModel)]="category.createdBy" placeholder="Your name" [disabled]="viewOnly" />
        </div>
      }
      @if (categoryId) {
        <div class="form-group">
          <label>Updated By</label>
          <input type="text" [(ngModel)]="category.updatedBy" placeholder="Your name" [disabled]="viewOnly" />
        </div>
      }

      <div class="form-actions">
        @if (!viewOnly) {
          <button (click)="submit()" [disabled]="submitting" class="btn-save">
            {{ submitting ? 'Saving...' : (categoryId ? 'Update Category' : 'Create Category') }}
          </button>
        }
        <button (click)="cancel()" [disabled]="submitting" class="btn-cancel">{{ viewOnly ? 'Back' : 'Cancel' }}</button>
      </div>
    </div>
  }
</div>
