<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' View Rack' : (rackId ? ' Edit Rack' : ' Add Rack') }}</h2>
  </div>

  @if (error) {
    <div class="alert-error">{{ error }}</div>
  }
  @if (success) {
    <div class="alert-success"> {{ success }}</div>
  }
  @if (loading) {
    <div class="alert-info"> Loading...</div>
  }

  @if (!loading) {
    <div class="form-box">
      <div class="form-group">
        <label>Parent Section <span class="required">*</span></label>
        <select [(ngModel)]="rack.sectionId" [disabled]="viewOnly" name="sectionId">
          <option value="0" disabled>-- Select Section --</option>
          @for (section of filteredSections; track section.sectionId) {
            <option [value]="section.sectionId">
              {{ section.sectionCode }} - {{ section.sectionName }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Rack Code <span class="required">*</span></label>
        <input 
          type="text" 
          [(ngModel)]="rack.rackCode" 
          [disabled]="viewOnly"
          placeholder="e.g., R-01, R-02"
          name="rackCode"
        />
      </div>

      <div class="form-group">
        <label>Rack Name</label>
        <input 
          type="text" 
          [(ngModel)]="rack.rackName" 
          [disabled]="viewOnly"
          placeholder="e.g., Main Rack A"
          name="rackName"
        />
      </div>

      <div class="form-group">
        <label>Total Shelves <span class="required">*</span></label>
        <input 
          type="number" 
          [(ngModel)]="rack.totalShelves" 
          [disabled]="viewOnly"
          min="1"
          max="20"
          placeholder="e.g., 6"
          name="totalShelves"
        />
        <small>Between 1 and 20 shelves</small>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>DDC Range Start</label>
          <input 
            type="text" 
            [(ngModel)]="rack.ddcRangeStart" 
            [disabled]="viewOnly"
            placeholder="e.g., 000"
            name="ddcRangeStart"
          />
        </div>
        <div class="form-group">
          <label>DDC Range End</label>
          <input 
            type="text" 
            [(ngModel)]="rack.ddcRangeEnd" 
            [disabled]="viewOnly"
            placeholder="e.g., 099"
            name="ddcRangeEnd"
          />
        </div>
      </div>

      @if (!viewOnly) {
        <div class="form-actions">
          <button 
            (click)="submit()" 
            [disabled]="submitting"
            class="btn-submit"
          >
            {{ submitting ? ' Saving...' : '💾 Save' }}
          </button>
          <button 
            routerLink="/admin/location/racks"
            class="btn-cancel"
          >
            ❌ Cancel
          </button>
        </div>
      } @else {
        <div class="form-actions">
          <a routerLink="/admin/location/racks" class="btn-cancel">
            ← Back to Racks
          </a>
        </div>
      }
    </div>
  }
</div>
