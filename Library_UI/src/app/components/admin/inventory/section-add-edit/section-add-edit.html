<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' View Section' : (sectionId ? ' Edit Section' : ' Add Section') }}</h2>
  </div>

  @if (error) {
    <div class="alert-error">{{ error }}</div>
  }
  @if (success) {
    <div class="alert-success"> {{ success }}</div>
  }
  @if (loading) {
    <div class="alert-info"> Loading...</div>
  }

  @if (!loading) {
    <div class="form-box">
      <div class="form-group">
        <label>Parent Floor <span class="required">*</span></label>
        <select [(ngModel)]="section.floorId" [disabled]="viewOnly" name="floorId">
          <option value="0" disabled>-- Select Floor --</option>
          @for (floor of floors; track floor.floorId) {
            <option [value]="floor.floorId">
              {{ floor.floorCode }} - {{ floor.floorName }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Section Code <span class="required">*</span></label>
        <input 
          type="text" 
          [(ngModel)]="section.sectionCode" 
          [disabled]="viewOnly"
          placeholder="e.g., S-01, S-02"
          name="sectionCode"
        />
      </div>

      <div class="form-group">
        <label>Section Name <span class="required">*</span></label>
        <input 
          type="text" 
          [(ngModel)]="section.sectionName" 
          [disabled]="viewOnly"
          placeholder="e.g., Fiction Books, Science"
          name="sectionName"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>DDC Range Start</label>
          <input 
            type="text" 
            [(ngModel)]="section.ddcRangeStart" 
            [disabled]="viewOnly"
            placeholder="e.g., 000"
            name="ddcRangeStart"
          />
        </div>
        <div class="form-group">
          <label>DDC Range End</label>
          <input 
            type="text" 
            [(ngModel)]="section.ddcRangeEnd" 
            [disabled]="viewOnly"
            placeholder="e.g., 099"
            name="ddcRangeEnd"
          />
        </div>
      </div>

      <div class="form-group checkbox">
        <label>
          <input 
            type="checkbox" 
            [(ngModel)]="section.isSpecial" 
            [disabled]="viewOnly"
            name="isSpecial"
          />
          Mark as Special Section
        </label>
      </div>

      @if (!viewOnly) {
        <div class="form-actions">
          <button 
            (click)="submit()" 
            [disabled]="submitting"
            class="btn-submit"
          >
            {{ submitting ? ' Saving...' : '💾 Save' }}
          </button>
          <button 
            routerLink="/admin/location/sections"
            class="btn-cancel"
          >
            ❌ Cancel
          </button>
        </div>
      } @else {
        <div class="form-actions">
          <a routerLink="/admin/location/sections" class="btn-cancel">
            ← Back to Sections
          </a>
        </div>
      }
    </div>
  }
</div>
