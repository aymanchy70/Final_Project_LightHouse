<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' View Publisher' : (publisherId ? ' Edit Publisher' : ' Add Publisher') }}</h2>
  </div>

  @if (error) { <div class="alert-error">{{ error }}</div> }
  @if (success) { <div class="alert-success"> {{ success }}</div> }
  @if (loading) { <div class="alert-info"> Loading...</div> }

  @if (!loading) {
    <div class="form-box">
      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="publisher.name" placeholder="Publisher name" [disabled]="viewOnly" />
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" [(ngModel)]="publisher.address" placeholder="Address" [disabled]="viewOnly" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="publisher.phone" placeholder="+880..." [disabled]="viewOnly" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="publisher.email" placeholder="publisher@email.com" [disabled]="viewOnly" />
        </div>
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="text" [(ngModel)]="publisher.website" placeholder="https://..." [disabled]="viewOnly" />
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="publisher.isActive" [disabled]="viewOnly" />
          <span>Active</span>
        </label>
      </div>

      @if (!publisherId) {
        <div class="form-group">
          <label>Created By</label>
          <input type="text" [(ngModel)]="publisher.createdBy" placeholder="Your name" [disabled]="viewOnly" />
        </div>
      }
      @if (publisherId) {
        <div class="form-group">
          <label>Updated By</label>
          <input type="text" [(ngModel)]="publisher.updatedBy" placeholder="Your name" [disabled]="viewOnly" />
        </div>
      }

      <div class="form-actions">
        @if (!viewOnly) {
          <button (click)="submit()" [disabled]="submitting" class="btn-save">
            {{ submitting ? 'Saving...' : (publisherId ? 'Update Publisher' : 'Create Publisher') }}
          </button>
        }
        <button (click)="cancel()" [disabled]="submitting" class="btn-cancel">{{ viewOnly ? 'Back' : 'Cancel' }}</button>
      </div>
    </div>
  }
</div>
