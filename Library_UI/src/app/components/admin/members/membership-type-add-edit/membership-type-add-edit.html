<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' View Membership Type' : (typeId ? ' Edit Membership Type' : ' Add Membership Type') }}</h2>
  </div>

  @if (error) { <div class="alert-error">{{ error }}</div> }
  @if (success) { <div class="alert-success"> {{ success }}</div> }
  @if (loading) { <div class="alert-info"> Loading...</div> }

  @if (!loading) {
    <div class="form-box">

      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <select [(ngModel)]="membershipType.name" [disabled]="viewOnly">
          <option [value]="null" disabled>Select membership type</option>
          <option value="Standard">Standard</option>
          <option value="Premium">Premium</option>
          <option value="Enterprise">Enterprise</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="membershipType.description" rows="3" placeholder="Brief description" [disabled]="viewOnly"></textarea>
      </div>

      <div class="section-title">📋 Borrowing Limits</div>

      <div class="form-row">
        <div class="form-group">
          <label>Max Books to Borrow</label>
          <input type="number" [(ngModel)]="membershipType.maxBooksCanBorrow" min="1" max="50" [disabled]="viewOnly" />
        </div>
        <div class="form-group">
          <label>Loan Period (Days)</label>
          <input type="number" [(ngModel)]="membershipType.loanPeriodDays" min="1" max="365" [disabled]="viewOnly" />
        </div>
      </div>

      <div class="form-group">
        <label>Max Books for In-Library Reading</label>
        <input type="number" [(ngModel)]="membershipType.maxBooksForInLibraryReading" min="1" max="20" [disabled]="viewOnly" />
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="membershipType.canBorrowRareBooks" [disabled]="viewOnly" />
          <span>Can Borrow Rare Books</span>
        </label>
      </div>

      <div class="section-title">💰 Fees & Fines</div>

      <div class="form-row">
        <div class="form-group">
          <label>Yearly Fee ($)</label>
          <input type="number" [(ngModel)]="membershipType.yearlyFee" min="0" step="0.01" placeholder="0.00" [disabled]="viewOnly" />
        </div>
        <div class="form-group">
          <label>Max Outstanding Fine ($)</label>
          <input type="number" [(ngModel)]="membershipType.maxOutstandingFine" min="0" step="0.01" placeholder="0.00" [disabled]="viewOnly" />
        </div>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="membershipType.isActive" [disabled]="viewOnly" />
          <span>Active</span>
        </label>
      </div>

      <div class="form-actions">
        @if (!viewOnly) {
          <button (click)="submit()" [disabled]="submitting" class="btn-save">
            {{ submitting ? 'Saving...' : (typeId ? 'Update Type' : 'Create Type') }}
          </button>
        }
        <button (click)="cancel()" [disabled]="submitting" class="btn-cancel">{{ viewOnly ? 'Back' : 'Cancel' }}</button>
      </div>
    </div>
  }
</div>
