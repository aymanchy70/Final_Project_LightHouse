<div class="container">
  <div class="header">
    <h2>{{ viewOnly ? ' Supplier Details' : (supplierId ? ' Edit Supplier' : ' Add Supplier') }}</h2>
  </div>
  @if (error) { <div class="alert-error">{{ error }}</div> }
  @if (success) { <div class="alert-success"> {{ success }}</div> }
  @if (loading) { <div class="alert-info"> Loading...</div> }
  @if (!loading) {
    <div class="form-box">
      <div class="section-title">🏭 Supplier Information</div>
      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="supplier.name" placeholder="Supplier name" [disabled]="viewOnly" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="supplier.email" placeholder="email@example.com" [disabled]="viewOnly" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="supplier.phone" placeholder="+880..." [disabled]="viewOnly" />
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea [(ngModel)]="supplier.address" placeholder="Full address" rows="3" [disabled]="viewOnly"></textarea>
      </div>
      @if (!viewOnly) {
        <div class="form-actions">
          <button (click)="submit()" [disabled]="submitting" class="btn-save">
            {{ submitting ? 'Saving...' : (supplierId ? 'Update Supplier' : 'Create Supplier') }}
          </button>
          <button (click)="cancel()" [disabled]="submitting" class="btn-cancel">Cancel</button>
        </div>
      } @else {
        <div class="form-actions">
          <button (click)="cancel()" class="btn-cancel">← Back to List</button>
        </div>
      }
    </div>
  }
</div>
