<div class="register-container">
  <div class="register-box">
    <h2>Create Account</h2>
    
    @if (error) { <div class="alert-error">{{ error }}</div> }
    @if (success) { <div class="alert-success">{{ success }}</div> }
    
    <form (ngSubmit)="register()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com" required />
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
      </div>
      
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required />
      </div>
      
      <button type="submit" [disabled]="loading" class="btn-register">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>
    </form>
    
    <div class="login-link">
      Already have an account? <a routerLink="/login">Log in here</a>
    </div>
  </div>
</div>
