<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LibraryUI</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    app-root {
      display: block;
      height: 100%;
      width: 100%;
    }
    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f2f5;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 360px;
    }
    h2 {
      margin: 0 0 6px;
      color: #1a1a2e;
      font-size: 24px;
    }
    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #4f6ef7;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled {
      background: #aaa;
    }
  </style>
</head>
<body>
  <app-root>
    <div class="login-wrapper">
      <div class="login-box">
        <h2>Library Admin</h2>
        <p class="subtitle">Sign in to your account</p>
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password" />
        </div>
        <button>Sign In</button>
        <p style="text-align: center; margin-top: 16px; font-size: 12px; color: #999;">
          Loading application...
        </p>
      </div>
    </div>
  </app-root>
</body>
</html>
